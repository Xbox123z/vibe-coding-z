<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 魔方仿真</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: #060610;
    color: #e0e0f0;
    font-family: 'Exo 2', sans-serif;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,30,0.06) 2px, rgba(0,0,30,0.06) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: linear-gradient(90deg, #0a0a20, #0d0d25);
    border-bottom: 1px solid #1e1e4a;
    flex-shrink: 0;
  }
  #header h1 {
    font-family: 'Exo 2', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #60a0ff, #a060ff, #ff6080);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #move-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #5566aa;
    letter-spacing: 1px;
  }
  #move-counter span {
    color: #88aaff;
    font-size: 15px;
  }

  /* ── Scene ── */
  #scene {
    flex: 1;
    min-height: 0;
    position: relative;
  }
  canvas {
    display: block;
    cursor: grab;
    touch-action: none;
  }
  canvas:active { cursor: grabbing; }

  /* Overlay message */
  #overlay-msg {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #333366;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  /* ── UI Panel ── */
  #ui {
    flex-shrink: 0;
    background: linear-gradient(180deg, #0c0c22 0%, #080818 100%);
    border-top: 1px solid #1a1a3a;
    padding: 10px 12px 8px;
  }

  /* Face buttons */
  .face-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .face-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .face-label {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #44446a;
    text-transform: uppercase;
  }
  .color-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .btn-pair { display: flex; gap: 3px; }

  button {
    padding: 5px 9px;
    min-width: 34px;
    border-radius: 4px;
    border: 1px solid #252545;
    background: #141428;
    color: #8888bb;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all .18s;
    position: relative;
    overflow: hidden;
  }
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
    pointer-events: none;
  }
  button:hover:not(:disabled) {
    background: #1e1e40;
    border-color: #5555a0;
    color: #aabbff;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(80,80,200,.2);
  }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: .22; cursor: not-allowed; transform: none !important; }

  /* Action buttons */
  .action-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 7px;
  }
  .action-row button {
    padding: 7px 16px;
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    border-radius: 5px;
  }
  #btn-scramble {
    background: linear-gradient(135deg, #1a2550, #152040);
    border-color: #304080;
    color: #6090e0;
  }
  #btn-scramble:hover:not(:disabled) {
    background: linear-gradient(135deg, #253570, #1a2f60);
    border-color: #5070c0;
    box-shadow: 0 4px 16px rgba(60,100,200,.3);
  }
  #btn-solve {
    background: linear-gradient(135deg, #102a1a, #0d2015);
    border-color: #2a6040;
    color: #50c070;
  }
  #btn-solve:hover:not(:disabled) {
    background: linear-gradient(135deg, #183a28, #122e20);
    border-color: #40a060;
    box-shadow: 0 4px 16px rgba(60,180,80,.25);
  }
  #btn-reset {
    background: linear-gradient(135deg, #2a1010, #201010);
    border-color: #604030;
    color: #c06040;
  }
  #btn-reset:hover:not(:disabled) {
    background: linear-gradient(135deg, #3a1818, #2a1410);
    border-color: #906050;
    box-shadow: 0 4px 16px rgba(180,80,40,.25);
  }

  /* Status */
  #status-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    height: 16px;
  }
  #status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #223;
    transition: background .3s, box-shadow .3s;
  }
  #status-dot.active {
    background: #50c070;
    box-shadow: 0 0 8px #50c070;
    animation: pulse 1s infinite;
  }
  #status-dot.solving {
    background: #60a0ff;
    box-shadow: 0 0 8px #60a0ff;
    animation: pulse 0.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #status-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #444466;
    letter-spacing: 1px;
    min-width: 260px;
    text-align: center;
    transition: color .3s;
  }
  #status-text.active { color: #60aa80; }
  #status-text.solving { color: #6090cc; }

  /* Solved flash */
  @keyframes solvedFlash {
    0%   { background: transparent; }
    30%  { background: rgba(80,220,100,.08); }
    100% { background: transparent; }
  }
  .solved-flash { animation: solvedFlash 1.5s ease-out; }
</style>
</head>
<body>

<div id="header">
  <h1>⬛ 3D MAGIC CUBE</h1>
  <div id="move-counter">步数 <span id="step-count">0</span></div>
</div>

<div id="scene">
  <canvas id="c"></canvas>
  <div id="overlay-msg">DRAG TO ROTATE · SCROLL TO ZOOM</div>
</div>

<div id="ui">
  <div class="face-row">
    <div class="face-group">
      <div class="face-label">
        <span class="color-dot" style="background:#fff;border:1px solid #333"></span>
        UP
      </div>
      <div class="btn-pair">
        <button onclick="qM('U',1)" title="U 顺时针">U</button>
        <button onclick="qM('U',-1)" title="U 逆时针">U'</button>
      </div>
    </div>
    <div class="face-group">
      <div class="face-label">
        <span class="color-dot" style="background:#FFEE00"></span>
        DN
      </div>
      <div class="btn-pair">
        <button onclick="qM('D',1)" title="D 顺时针">D</button>
        <button onclick="qM('D',-1)" title="D 逆时针">D'</button>
      </div>
    </div>
    <div class="face-group">
      <div class="face-label">
        <span class="color-dot" style="background:#0066FF"></span>
        FR
      </div>
      <div class="btn-pair">
        <button onclick="qM('F',1)" title="F 顺时针">F</button>
        <button onclick="qM('F',-1)" title="F 逆时针">F'</button>
      </div>
    </div>
    <div class="face-group">
      <div class="face-label">
        <span class="color-dot" style="background:#00AA00"></span>
        BK
      </div>
      <div class="btn-pair">
        <button onclick="qM('B',1)" title="B 顺时针">B</button>
        <button onclick="qM('B',-1)" title="B 逆时针">B'</button>
      </div>
    </div>
    <div class="face-group">
      <div class="face-label">
        <span class="color-dot" style="background:#FF8800"></span>
        LT
      </div>
      <div class="btn-pair">
        <button onclick="qM('L',1)" title="L 顺时针">L</button>
        <button onclick="qM('L',-1)" title="L 逆时针">L'</button>
      </div>
    </div>
    <div class="face-group">
      <div class="face-label">
        <span class="color-dot" style="background:#FF2020"></span>
        RT
      </div>
      <div class="btn-pair">
        <button onclick="qM('R',1)" title="R 顺时针">R</button>
        <button onclick="qM('R',-1)" title="R 逆时针">R'</button>
      </div>
    </div>
  </div>

  <div class="action-row">
    <button id="btn-scramble" onclick="scramble()">🔀 打乱</button>
    <button id="btn-solve" onclick="autoSolve()" disabled>✨ 自动还原</button>
    <button id="btn-reset" onclick="resetCube()">↺ 重置</button>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <div id="status-text">拖动旋转视角 · 滚轮缩放 · 点击按钮操作魔方</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════
//  MOVE DEFINITIONS
// ═══════════════════════════════════════
// Verified rotation directions (standard Rubik's notation):
//   U cw = rotY(+π/2)  ─  F→R confirmed
//   D cw = rotY(-π/2)  ─  F→L confirmed
//   R cw = rotX(-π/2)  ─  F→U confirmed
//   L cw = rotX(+π/2)  ─  F→D confirmed
//   F cw = rotZ(-π/2)  ─  U→R confirmed
//   B cw = rotZ(+π/2)  ─  U→L confirmed

const MOVE_DEF = {
  U: { axis:'y', val: 1,  angle:  Math.PI/2 },
  D: { axis:'y', val:-1,  angle: -Math.PI/2 },
  R: { axis:'x', val: 1,  angle: -Math.PI/2 },
  L: { axis:'x', val:-1,  angle:  Math.PI/2 },
  F: { axis:'z', val: 1,  angle: -Math.PI/2 },
  B: { axis:'z', val:-1,  angle:  Math.PI/2 },
};

// Sticker colors (BoxGeometry face order: +x,-x,+y,-y,+z,-z)
const CLR = {
  xp: 0xFF2525, xn: 0xFF8800,
  yp: 0xF8F8F8, yn: 0xFFEE00,
  zp: 0x1155FF, zn: 0x00AA00,
  blk: 0x0a0a0a,
};

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let scene, camera, renderer;
let cubies = [];
let AV;                   // axis vectors (initialized after THREE loads)
let moveQueue = [];
let isAnimating = false;
let moveHistory = [];     // for auto-solve reversal
let totalSteps = 0;

// Camera spherical
let camR = 6.8, camTh = 0.55, camPh = 1.05;
let isDrag = false, lmx = 0, lmy = 0;

const ANIM_MS = 160;      // ms per move

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
function init() {
  AV = {
    x: new THREE.Vector3(1,0,0),
    y: new THREE.Vector3(0,1,0),
    z: new THREE.Vector3(0,0,1),
  };

  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x060610);

  // Camera
  camera = new THREE.PerspectiveCamera(42, 1, 0.1, 60);
  syncCam();

  // Renderer
  const cv = document.getElementById('c');
  renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = false;

  // Lighting — warm top, cool fill, subtle rim
  scene.add(new THREE.AmbientLight(0xd0d8ff, 0.5));
  const sun = new THREE.DirectionalLight(0xfff0e0, 0.9);
  sun.position.set(6, 9, 5);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x8090ff, 0.3);
  fill.position.set(-5, -3, -4);
  scene.add(fill);
  const rim = new THREE.DirectionalLight(0xff80a0, 0.15);
  rim.position.set(0, -6, 6);
  scene.add(rim);

  buildCube();
  doResize();
  window.addEventListener('resize', doResize);
  setupControls(cv);

  // Render loop
  (function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); })();

  refreshUI();
}

// ═══════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function syncCam() {
  camera.position.set(
    camR * Math.sin(camPh) * Math.sin(camTh),
    camR * Math.cos(camPh),
    camR * Math.sin(camPh) * Math.cos(camTh)
  );
  camera.lookAt(0, 0, 0);
}

function doResize() {
  const el = document.getElementById('scene');
  const w = el.clientWidth, h = el.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

function setupControls(cv) {
  // Mouse
  cv.addEventListener('mousedown', e => { isDrag = true; lmx = e.clientX; lmy = e.clientY; });
  window.addEventListener('mousemove', e => {
    if (!isDrag) return;
    camTh -= (e.clientX - lmx) * 0.007;
    camPh  = clamp(camPh + (e.clientY - lmy) * 0.007, 0.1, Math.PI - 0.1);
    lmx = e.clientX; lmy = e.clientY;
    syncCam();
  });
  window.addEventListener('mouseup', () => isDrag = false);
  cv.addEventListener('wheel', e => {
    camR = clamp(camR + e.deltaY * 0.005, 3.5, 14);
    syncCam();
    e.preventDefault();
  }, { passive: false });

  // Touch
  cv.addEventListener('touchstart', e => {
    isDrag = true;
    lmx = e.touches[0].clientX; lmy = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });
  window.addEventListener('touchmove', e => {
    if (!isDrag || !e.touches[0]) return;
    camTh -= (e.touches[0].clientX - lmx) * 0.007;
    camPh  = clamp(camPh + (e.touches[0].clientY - lmy) * 0.007, 0.1, Math.PI - 0.1);
    lmx = e.touches[0].clientX; lmy = e.touches[0].clientY;
    syncCam();
  }, { passive: false });
  window.addEventListener('touchend', () => isDrag = false);
}

// ═══════════════════════════════════════
//  CUBE BUILDING
// ═══════════════════════════════════════
function makeCubie(x, y, z) {
  const geo = new THREE.BoxGeometry(0.92, 0.92, 0.92);
  // Rounded-ish look via bevel — use a plain box, rely on lighting
  const mat = c => new THREE.MeshLambertMaterial({ color: c });
  const mesh = new THREE.Mesh(geo, [
    mat(x ===  1 ? CLR.xp : CLR.blk),
    mat(x === -1 ? CLR.xn : CLR.blk),
    mat(y ===  1 ? CLR.yp : CLR.blk),
    mat(y === -1 ? CLR.yn : CLR.blk),
    mat(z ===  1 ? CLR.zp : CLR.blk),
    mat(z === -1 ? CLR.zn : CLR.blk),
  ]);
  mesh.position.set(x, y, z);
  return mesh;
}

function buildCube() {
  cubies.forEach(m => scene.remove(m));
  cubies = [];
  for (let x = -1; x <= 1; x++)
    for (let y = -1; y <= 1; y++)
      for (let z = -1; z <= 1; z++) {
        const m = makeCubie(x, y, z);
        scene.add(m);
        cubies.push(m);
      }
}

// ═══════════════════════════════════════
//  MOVE EXECUTION
// ═══════════════════════════════════════
const ease = t => t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;

function worldAxis(mesh, axis) {
  const v = new THREE.Vector3();
  mesh.getWorldPosition(v);
  return Math.round(v[axis]);
}

function execMove(face, dir, done) {
  const def   = MOVE_DEF[face];
  const angle = def.angle * dir;
  const av    = AV[def.axis];

  // Gather the 9 cubies in this layer
  const affected = cubies.filter(m => worldAxis(m, def.axis) === def.val);

  // Pivot group — keeps world transforms intact while we rotate
  const pivot = new THREE.Group();
  scene.add(pivot);
  affected.forEach(m => pivot.attach(m));

  const t0 = performance.now();
  (function frame(now) {
    const t = Math.min((now - t0) / ANIM_MS, 1);
    pivot.setRotationFromAxisAngle(av, angle * ease(t));

    if (t < 1) { requestAnimationFrame(frame); return; }

    // Commit exact rotation
    pivot.setRotationFromAxisAngle(av, angle);
    affected.forEach(m => {
      scene.attach(m);
      // Snap positions to integer grid to eliminate float drift
      m.position.set(
        Math.round(m.position.x),
        Math.round(m.position.y),
        Math.round(m.position.z)
      );
      m.quaternion.normalize();
    });
    scene.remove(pivot);
    done();
  })(t0);
}

// ═══════════════════════════════════════
//  QUEUE PROCESSOR
// ═══════════════════════════════════════
function processQueue() {
  if (!moveQueue.length) {
    isAnimating = false;
    setStatus('就绪', '');
    refreshUI();
    return;
  }
  isAnimating = true;
  refreshUI();

  const { face, dir, record } = moveQueue.shift();
  if (record) {
    moveHistory.push({ face, dir });
    totalSteps++;
    document.getElementById('step-count').textContent = totalSteps;
  }

  const label = face + (dir < 0 ? "'" : '');
  setStatus(`执行 ${label} · 队列 ${moveQueue.length} 步`, 'active');

  execMove(face, dir, processQueue);
}

// ═══════════════════════════════════════
//  PUBLIC API
// ═══════════════════════════════════════
function qM(face, dir, record = true) {
  moveQueue.push({ face, dir, record });
  if (!isAnimating) processQueue();
}

function scramble() {
  if (isAnimating) return;
  moveHistory = [];
  const faces = Object.keys(MOVE_DEF);
  let prev = '';
  for (let i = 0; i < 22; i++) {
    let f;
    // Avoid repeating same face twice in a row
    do { f = faces[Math.floor(Math.random() * faces.length)]; } while (f === prev);
    prev = f;
    moveQueue.push({ face: f, dir: Math.random() > 0.5 ? 1 : -1, record: true });
  }
  setStatus('打乱中...', 'active');
  processQueue();
}

function autoSolve() {
  if (isAnimating || !moveHistory.length) return;
  // Reverse and invert every recorded move
  const solveSeq = [...moveHistory].reverse().map(m => ({
    face:   m.face,
    dir:   -m.dir,
    record: false,
  }));
  moveHistory = [];
  moveQueue.push(...solveSeq);
  setStatus('还原中...', 'solving');
  processQueue();
}

function resetCube() {
  if (isAnimating) return;
  moveQueue   = [];
  moveHistory = [];
  totalSteps  = 0;
  document.getElementById('step-count').textContent = '0';
  buildCube();
  setStatus('已重置', '');
  refreshUI();
  // Visual flash
  document.body.classList.remove('solved-flash');
  void document.body.offsetWidth; // reflow
}

// ═══════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════
function setStatus(msg, state) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  text.textContent = msg;
  dot.className   = state;
  text.className  = state;
}

function refreshUI() {
  // Disable all buttons while animating
  document.querySelectorAll('button').forEach(b => b.disabled = isAnimating);
  if (!isAnimating) {
    // Solve only available if there is history
    document.getElementById('btn-solve').disabled = moveHistory.length === 0;

    // Celebration if history just became empty (solve completed)
    if (moveHistory.length === 0 && totalSteps > 0) {
      setStatus('✓ 还原成功！', '');
      document.body.classList.remove('solved-flash');
      void document.body.offsetWidth;
      document.body.classList.add('solved-flash');
    }
  }
}

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
init();
</script>
</body>
</html>
